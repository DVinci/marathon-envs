name: Link Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 9am UTC
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    env:
      LINK_CHECK: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:links
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: link-check-report
          path: playwright-report/
          retention-days: 14
