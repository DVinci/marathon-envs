name: Validate

on:
  pull_request:
    paths:
      - 'config/**'
      - 'tests/**'
      - 'package*.json'
      - 'playwright.config.ts'
      - '*.md'
      - 'CLAUDE.md'
  push:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
