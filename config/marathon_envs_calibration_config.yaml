engine_settings:
  time_scale: 20
  target_frame_rate: -1
  quality_level: 0

default_settings:
  trainer_type: ppo
  hyperparameters:
    batch_size: 64
    buffer_size: 512
    learning_rate: 1.0e-4
    beta: 1.0e-5
    epsilon: 0.2
    lambd: 0.95
    num_epoch: 3
    learning_rate_schedule: linear
  network_settings:
    normalize: true
    hidden_units: 256
    num_layers: 2
    vis_encode_type: simple
  reward_signals:
    extrinsic:
      gamma: 0.99
      strength: 1.0
  max_steps: 10000
  time_horizon: 100
  summary_freq: 5000
  checkpoint_interval: 5000
  keep_checkpoints: 1

